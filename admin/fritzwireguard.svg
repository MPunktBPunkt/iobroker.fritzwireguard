<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1628"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2196F3"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>

  <!-- Shield shape -->
  <path d="M50 12 L74 22 L74 50 Q74 68 50 80 Q26 68 26 50 L26 22 Z"
        fill="none" stroke="url(#g1)" stroke-width="3.5"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Lock shackle -->
  <path d="M42 45 L42 38 Q42 31 50 31 Q58 31 58 38 L58 45"
        fill="none" stroke="url(#g1)" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Lock body -->
  <rect x="38" y="44" width="24" height="17" rx="4"
        fill="url(#g1)"/>

  <!-- Keyhole -->
  <circle cx="50" cy="51" r="3" fill="#0e1628"/>
  <rect x="48.5" y="53" width="3" height="4" rx="1" fill="#0e1628"/>

  <!-- WireGuard wave at bottom -->
  <path d="M22 90 Q28 85 34 90 Q40 95 46 90 Q52 85 58 90 Q64 95 70 90 Q76 85 80 90"
        fill="none" stroke="#2196F3" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
</svg>
